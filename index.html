<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة الشكل الهندسي ثلاثي الأبعاد</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        @media (max-width: 600px) {
            #score {
                font-size: 14px;
                top: 15px;
                right: 15px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- استيراد مكتبة Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- إعداد المشهد ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20); // لون خلفية داكن
        
        // --- إعداد الكاميرا (منظور ثابت بدون تكبير/تصغير) ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);
        
        // --- إعداد المسرّع (Renderer) مع تحسينات للأجهزة اللمسية ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // تحسين الأداء
        renderer.shadowMap.enabled = true; // تفعيل الظلال
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // منع سلوك التكبير/التصغير باللمس عبر CSS و HTML meta
        // تم إضافة user-scalable=no في meta، ونمنع أيضًا أحداث اللمس المزدوجة التي تسبب التكبير
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); // منع حركة القرص للتكبير
            }
        }, { passive: false });
        
        // منع حدث wheel (عجلة الماوس) لمنع التكبير/التصغير
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
        }, { passive: false });
        
        // منع حدث keydown للتحكم في التكبير (مثل Ctrl +)
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '_')) {
                e.preventDefault();
            }
        });
        
        // --- الإضاءة ---
        
        // ضوء محيطي ناعم
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // ضوء رئيسي (مباشر) يخلق ظلالاً
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(2, 5, 3);
        directionalLight.castShadow = true;
        directionalLight.receiveShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        const d = 10;
        directionalLight.shadow.camera.left = -d;
        directionalLight.shadow.camera.right = d;
        directionalLight.shadow.camera.top = d;
        directionalLight.shadow.camera.bottom = -d;
        directionalLight.shadow.camera.near = 1;
        directionalLight.shadow.camera.far = 15;
        scene.add(directionalLight);
        
        // أضواء ملونة للزينة
        const light1 = new THREE.PointLight(0xff0040, 1, 10);
        light1.position.set(2, 1, 2);
        scene.add(light1);
        
        const light2 = new THREE.PointLight(0x00ff40, 1, 10);
        light2.position.set(-2, 1, -2);
        scene.add(light2);
        
        const light3 = new THREE.PointLight(0x0040ff, 1, 10);
        light3.position.set(2, 1, -2);
        scene.add(light3);
        
        // --- إنشاء الشكل الهندسي الرئيسي (مجسم متعدد الأشكال) ---
        
        // مجموعة لتجميع الأشكال
        const mainGroup = new THREE.Group();
        
        // شكل مركزي: كرة متعددة الأوجه (Icosahedron)
        const geometry1 = new THREE.IcosahedronGeometry(1, 0); // تفاصيل قليلة للحصول على شكل هندسي واضح
        const material1 = new THREE.MeshStandardMaterial({ 
            color: 0xff5500,
            emissive: 0x331100,
            roughness: 0.3,
            metalness: 0.1,
            wireframe: false
        });
        const coreShape = new THREE.Mesh(geometry1, material1);
        coreShape.castShadow = true;
        coreShape.receiveShadow = true;
        mainGroup.add(coreShape);
        
        // إطار سلكي حول الكرة
        const wireframeGeo = new THREE.IcosahedronGeometry(1.05, 0);
        const wireframeMat = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            emissive: 0x442200,
            wireframe: true,
            transparent: true,
            opacity: 0.7
        });
        const wireframeSphere = new THREE.Mesh(wireframeGeo, wireframeMat);
        wireframeSphere.castShadow = true;
        wireframeSphere.receiveShadow = false;
        mainGroup.add(wireframeSphere);
        
        // حلقات تدور حول الشكل (Torus)
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0x33aaff, emissive: 0x113366 });
        const ring1 = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.05, 16, 100), ringMaterial);
        ring1.rotation.x = Math.PI / 2;
        ring1.rotation.z = 0.3;
        ring1.castShadow = true;
        ring1.receiveShadow = false;
        mainGroup.add(ring1);
        
        const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.9, 0.05, 16, 100), ringMaterial);
        ring2.rotation.y = 0.8;
        ring2.rotation.x = 0.7;
        ring2.material = new THREE.MeshStandardMaterial({ color: 0xff33aa, emissive: 0x331122 });
        ring2.castShadow = true;
        ring2.receiveShadow = false;
        mainGroup.add(ring2);
        
        // مكعبات صغيرة تدور حول الشكل الرئيسي
        const smallCubesGroup = new THREE.Group();
        for (let i = 0; i < 8; i++) {
            const cubeGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const cubeMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const cube = new THREE.Mesh(cubeGeo, cubeMat);
            const angle = (i / 8) * Math.PI * 2;
            cube.position.set(Math.cos(angle) * 2.2, Math.sin(angle * 2) * 0.5, Math.sin(angle) * 2.2);
            cube.castShadow = true;
            cube.receiveShadow = false;
            smallCubesGroup.add(cube);
        }
        mainGroup.add(smallCubesGroup);
        
        scene.add(mainGroup);
        
        // --- إنشاء أرضية عاكسة ---
        const floorGeometry = new THREE.CircleGeometry(8, 32);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e,
            roughness: 0.4,
            metalness: 0.1,
            transparent: true,
            opacity: 0.6,
            side: THREE.DoubleSide
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // شبكة أرضية للزينة
        const gridHelper = new THREE.GridHelper(15, 20, 0x3366ff, 0x2244aa);
        gridHelper.position.y = -1.1;
        scene.add(gridHelper);
        
        // --- إضافة جزيئات صغيرة (Stars) حول المشهد ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 600;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 30;
            starsPositions[i+1] = (Math.random() - 0.5) * 20;
            starsPositions[i+2] = (Math.random() - 0.5) * 30;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // --- متغيرات التحكم باللمس والحركة ---
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        let isTouching = false;
        let touchX = 0;
        let touchY = 0;
        
        // --- متغيرات لتأثير الدوران التلقائي ---
        let autoRotateSpeed = 0.005;
        
        // --- أحداث اللمس للهواتف والأجهزة اللوحية ---
        renderer.domElement.addEventListener('touchstart', handleTouchStart, { passive: false });
        renderer.domElement.addEventListener('touchmove', handleTouchMove, { passive: false });
        renderer.domElement.addEventListener('touchend', handleTouchEnd);
        renderer.domElement.addEventListener('touchcancel', handleTouchEnd);
        
        // --- أحداث الماوس لأجهزة الكمبيوتر (اختياري) ---
        renderer.domElement.addEventListener('mousedown', handleMouseDown);
        renderer.domElement.addEventListener('mousemove', handleMouseMove);
        renderer.domElement.addEventListener('mouseup', handleMouseUp);
        renderer.domElement.addEventListener('mouseleave', handleMouseUp);
        
        // --- دوال معالجة اللمس ---
        function handleTouchStart(event) {
            event.preventDefault();
            // منع تكبير اللمس المزدوج
            if (event.touches.length === 2) return;
            
            const touch = event.touches[0];
            if (touch) {
                isTouching = true;
                touchX = (touch.clientX / window.innerWidth) * 2 - 1;
                touchY = -(touch.clientY / window.innerHeight) * 2 + 1;
                
                
                // تأثير مؤقت عند اللمس
                mainGroup.children.forEach(child => {
                    if (child.material && !child.material.wireframe) {
                        child.material.emissive.setHex(0x444400);
                        setTimeout(() => {
                            if (child.material) child.material.emissive.setHex(0x000000);
                        }, 200);
                    }
                });
            }
        }
        
        function handleTouchMove(event) {
            event.preventDefault();
            if (isTouching && event.touches.length === 1) {
                const touch = event.touches[0];
                if (touch) {
                    touchX = (touch.clientX / window.innerWidth) * 2 - 1;
                    touchY = -(touch.clientY / window.innerHeight) * 2 + 1;
                    
                    // تحديث زوايا الهدف بناءً على موقع اللمس
                    targetRotationY = touchX * Math.PI; // دوران أفقي كامل
                    targetRotationX = touchY * (Math.PI / 3); // دوران رأسي محدود
                }
            }
        }
        
        function handleTouchEnd(event) {
            event.preventDefault();
            isTouching = false;
            // لا نعيد تعيين الهدف، بل نتركه يستمر في الدوران التلقائي ببطء
        }
        
        // --- دوال الماوس (للكمبيوتر) ---
        function handleMouseDown(event) {
            isTouching = true;
            touchX = (event.clientX / window.innerWidth) * 2 - 1;
            touchY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // تأثير مؤقت عند النقر
            mainGroup.children.forEach(child => {
                if (child.material && !child.material.wireframe) {
                    child.material.emissive.setHex(0x444400);
                    setTimeout(() => {
                        if (child.material) child.material.emissive.setHex(0x000000);
                    }, 200);
                }
            });
        }
        
        function handleMouseMove(event) {
            if (isTouching) {
                touchX = (event.clientX / window.innerWidth) * 2 - 1;
                touchY = -(event.clientY / window.innerHeight) * 2 + 1;
                
                targetRotationY = touchX * Math.PI;
                targetRotationX = touchY * (Math.PI / 3);
            }
        }
        
        function handleMouseUp(event) {
            isTouching = false;
        }
        
        // --- تكييف حجم الشاشة ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // --- حلقة الرسوم المتحركة ---
        function animate() {
            requestAnimationFrame(animate);
            
            // تحديث زوايا الدوران بسلاسة (interpolation)
            if (isTouching) {
                // إذا كان المستخدم يلمس، نتحرك بسرعة نحو الهدف
                currentRotationY += (targetRotationY - currentRotationY) * 0.1;
                currentRotationX += (targetRotationX - currentRotationX) * 0.1;
            } else {
                // إذا لم يكن هناك لمس، دوران تلقائي بطيء
                currentRotationY += autoRotateSpeed;
                // لا نغير currentRotationX في الوضع التلقائي، مع ميل بسيط للعودة إلى الصفر
                currentRotationX *= 0.98;
                targetRotationX = 0; // إعادة توجيه الهدف تدريجياً للاستقامة
            }
            
            // تطبيق الدوران على المجموعة الرئيسية
            mainGroup.rotation.x = currentRotationX;
            mainGroup.rotation.y = currentRotationY;
            
            // دوران إضافي للحلقات والمكعبات الصغيرة
            if (mainGroup.children.length > 0) {
                // دوران الحلقات بشكل منفصل
                if (mainGroup.children[2]) mainGroup.children[2].rotation.z += 0.01;
                if (mainGroup.children[3]) mainGroup.children[3].rotation.x += 0.015;
                
                // دوران المكعبات الصغيرة حول نفسها
                const cubesGroup = mainGroup.children[4];
                if (cubesGroup) {
                    cubesGroup.children.forEach((cube, index) => {
                        cube.rotation.x += 0.02;
                        cube.rotation.y += 0.03;
                    });
                }
            }
            
            // تحريك النجوم ببطء
            stars.rotation.y += 0.0002;
            
            // تحريك الكاميرا قليلاً للحصول على تأثير حيوي ولكن بدون تغيير مستوى التكبير/التصغير (نحافظ على مسافة ثابتة نسبياً)
            const time = Date.now() * 0.001;
            // نحافظ على مسافة الكاميرا من المركز بين 7.5 و 8.5 لتجنب تغيير الحجم الكبير
            const radiusX = 5.5;
            const radiusZ = 7.5;
            camera.position.x = Math.sin(time * 0.1) * 1.2 + 4.5;
            camera.position.z = Math.cos(time * 0.1) * 1.2 + 7.2;
            camera.position.y = 3 + Math.sin(time * 0.2) * 0.4;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '0' || e.key === '=')) {
                e.preventDefault();
            }
        });
        
        console.log('لعبة الشكل الهندسي ثلاثي الأبعاد جاهزة! المس الشاشة لتحريك الشكل. تم تعطيل التكبير/التصغير.');
    </script>
</body>
</html>
